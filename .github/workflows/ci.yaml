name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo test
        run: cargo test --all-targets

  deb:
    name: Debian package
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-unknown-linux-gnu

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binary
        run: cargo build -p rkwhisper --release --target aarch64-unknown-linux-gnu

      - name: Build .deb
        run: cargo deb -p rkwhisper --no-build --target aarch64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rkwhisperd-deb
          path: target/aarch64-unknown-linux-gnu/debian/rkwhisperd_*.deb
