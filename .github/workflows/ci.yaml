name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo test
        run: cargo test --all-targets

  deb-rkwhisperd:
    name: rkwhisperd .deb
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-unknown-linux-gnu

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binary
        run: cargo build -p rkwhisper --release --target aarch64-unknown-linux-gnu

      - name: Build .deb
        run: cargo deb -p rkwhisper --no-build --target aarch64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rkwhisperd-deb
          path: target/aarch64-unknown-linux-gnu/debian/rkwhisperd_*.deb

  deb-python-client:
    name: python3-rkwhisper-client .deb (${{ matrix.ubuntu }})
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:${{ matrix.ubuntu }}
    strategy:
      matrix:
        ubuntu: ["24.04", "25.04", "26.04"]

    steps:
      - name: Install system packages
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git curl ca-certificates \
            debhelper fakeroot \
            dh-python \
            python3-all-dev \
            python3-maturin \
            cargo rustc

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          . $HOME/.cargo/env
          rustup default stable

      - name: Fetch cargo dependencies
        run: . $HOME/.cargo/env && cargo fetch --manifest-path rkwhisper-python/Cargo.toml

      - name: Build .deb
        working-directory: rkwhisper-python
        run: . $HOME/.cargo/env && dpkg-buildpackage -us -uc -b -rfakeroot -d

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-client-deb-ubuntu-${{ matrix.ubuntu }}
          path: python3-rkwhisper-client_*.deb

  deb-bench:
    name: rkwhisper-bench .deb
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper \
            fakeroot \
            dh-python \
            pybuild-plugin-pyproject \
            python3-all \
            python3-hatchling

      - name: Build .deb
        working-directory: rkwhisper-bench
        run: dpkg-buildpackage -us -uc -b -rfakeroot -d

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-deb
          path: rkwhisper-bench_*.deb
