name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo test
        run: cargo test --all-targets

  deb-rkwhisperd:
    name: rkwhisperd .deb
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-unknown-linux-gnu

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binary
        run: cargo build -p rkwhisper --release --target aarch64-unknown-linux-gnu

      - name: Build .deb
        run: cargo deb -p rkwhisper --no-build --target aarch64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rkwhisperd-deb
          path: target/aarch64-unknown-linux-gnu/debian/rkwhisperd_*.deb

  deb-python-client:
    name: python3-rkwhisper-client .deb
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper \
            fakeroot \
            dh-python \
            pybuild-plugin-pyproject \
            python3-all-dev \
            python3-build

      - name: Install maturin
        run: sudo apt-get install -y python3-maturin

      - name: Install additional Python versions via deadsnakes
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y \
            python3.13-dev \
            python3.14-dev

      - name: Fetch cargo dependencies
        run: cargo fetch --manifest-path rkwhisper-python/Cargo.toml

      - name: Build .deb
        working-directory: rkwhisper-python
        run: dpkg-buildpackage -us -uc -b -rfakeroot -d

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-client-deb
          path: python3-rkwhisper-client_*.deb

  deb-bench:
    name: rkwhisper-bench .deb
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper \
            fakeroot \
            dh-python \
            pybuild-plugin-pyproject \
            python3-all \
            python3-hatchling

      - name: Build .deb
        working-directory: rkwhisper-bench
        run: dpkg-buildpackage -us -uc -b -rfakeroot -d

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-deb
          path: rkwhisper-bench_*.deb
