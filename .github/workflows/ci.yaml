name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo test
        run: cargo test --all-targets
